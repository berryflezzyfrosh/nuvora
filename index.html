<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0B141A" />
<title>NUVORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">

<!-- Splash -->
<div id="splash" class="screen">
  <div class="splash-content">
    <svg viewBox="0 0 48 48" width="72" height="72" class="splash-spinner">
      <circle cx="24" cy="24" r="22" fill="none" stroke="#25D366" stroke-width="3" stroke-dasharray="40 100" stroke-linecap="round" />
      <circle cx="24" cy="24" r="10" fill="#25D366" opacity="0.8" />
    </svg>
    <h1 class="splash-title">NUVORA</h1>
  </div>
</div>

<!-- Auth -->
<div id="auth" class="screen hidden">
  <div class="auth-container">
    <div class="auth-logo">
      <svg viewBox="0 0 48 48" width="64" height="64">
        <circle cx="24" cy="24" r="22" fill="#25D366" />
        <path d="M24 12c-6.6 0-12 5.4-12 12 0 2.1.5 4 1.5 5.7L12 36l6.5-1.5c1.7.9 3.6 1.5 5.5 1.5 6.6 0 12-5.4 12-12s-5.4-12-12-12zm0 22c-1.8 0-3.5-.5-5-1.4l-.4-.2-3.8.9.9-3.7-.2-.4c-1-1.5-1.5-3.3-1.5-5.2 0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10z" fill="white" />
      </svg>
      <h1>NUVORA</h1>
      <p class="auth-subtitle">Secure, encrypted messaging</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" onclick="App.switchAuthTab('login')">Log In</button>
        <button id="tab-signup" class="auth-tab" onclick="App.switchAuthTab('signup')">Sign Up</button>
      </div>
      <form id="auth-form" onsubmit="App.handleAuth(event)">
        <div id="signup-fields" class="hidden">
          <div class="input-group">
            <i class="bx bx-user"></i>
            <input type="text" id="auth-fullname" placeholder="Full Name" maxlength="100" />
          </div>
          <div class="input-group">
            <i class="bx bx-at"></i>
            <input type="text" id="auth-username" placeholder="Username" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')" />
          </div>
        </div>
        <div class="input-group">
          <i class="bx bx-envelope"></i>
          <input type="email" id="auth-email" placeholder="Email" required />
        </div>
        <div class="input-group">
          <i class="bx bx-lock-alt"></i>
          <input type="password" id="auth-password" placeholder="Password" required />
        </div>
        <div id="pw-strength" class="hidden">
          <div class="strength-bar"><div id="strength-fill"></div></div>
          <span id="strength-label">Weak</span>
        </div>
        <div id="signup-pin" class="input-group hidden">
          <i class="bx bx-key"></i>
          <input type="password" id="auth-pin" placeholder="PIN (optional, for E2EE key lock)" />
        </div>
        <div id="auth-error" class="error-msg hidden"></div>
        <button type="submit" id="auth-submit" class="btn-primary">Log In</button>
      </form>
    </div>
    <p class="auth-footer"><i class="bx bx-lock-alt"></i> Messages are end-to-end encrypted. Only you and your recipients can read them.</p>
  </div>
</div>

<!-- Main Layout -->
<div id="main" class="screen hidden">
  <div class="main-layout">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title"><i class="bx bxl-whatsapp"></i> NUVORA</h1>
        <div class="sidebar-actions">
          <button onclick="App.openNewChat()" title="New chat"><i class="bx bx-edit-alt"></i></button>
          <button onclick="App.navigate('settings')" title="Settings"><i class="bx bx-dots-vertical-rounded"></i></button>
        </div>
      </div>
      <div class="search-bar">
        <i class="bx bx-search"></i>
        <input type="text" id="chat-search" placeholder="Search chats" oninput="App.filterChats(this.value)" />
      </div>
      <div id="chat-list" class="chat-list"></div>
      <div id="sidebar-footer" class="sidebar-footer" onclick="App.navigate('profile')"></div>
    </div>

    <!-- Chat Window -->
    <div id="chat-window" class="chat-window">
      <div id="chat-header" class="chat-header"></div>
      <div id="search-bar-inline" class="search-inline hidden">
        <i class="bx bx-search"></i>
        <input type="text" id="msg-search" placeholder="Search messages..." oninput="App.searchMessages(this.value)" />
        <button onclick="App.closeSearch()"><i class="bx bx-x"></i></button>
      </div>
      <div id="messages-container" class="messages-container"></div>
      <div id="reply-bar" class="reply-bar hidden"></div>
      <div id="edit-bar" class="edit-bar hidden"></div>
      <div id="emoji-picker" class="emoji-picker hidden"></div>
      <div class="input-bar">
        <button onclick="App.toggleEmoji()" title="Emoji"><i class="bx bx-smile"></i></button>
        <button onclick="App.triggerUpload()" title="Attach"><i class="bx bx-paperclip"></i></button>
        <input type="file" id="file-input" hidden onchange="App.handleUpload(event)" />
        <textarea id="message-input" placeholder="Type a message" rows="1" oninput="App.onInputChange(this)" onkeydown="App.onInputKey(event)"></textarea>
        <button id="send-btn" onclick="App.handleSend()" disabled><i class="bx bx-microphone"></i></button>
      </div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <i class="bx bxs-conversation"></i>
      <p>Select a chat to start messaging</p>
    </div>

    <!-- Profile Screen -->
    <div id="profile-screen" class="panel-screen hidden"></div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="panel-screen hidden"></div>

    <!-- People Screen -->
    <div id="people-screen" class="panel-screen hidden"></div>
  </div>
</div>

<!-- New Chat Modal -->
<div id="new-chat-modal" class="modal-overlay hidden" onclick="App.closeNewChat(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="new-chat-body"></div>
  </div>
</div>

<!-- Message Context Menu -->
<div id="msg-menu" class="msg-menu hidden"></div>

<!-- Call Modal -->
<div id="call-modal" class="call-modal hidden"></div>

</div>
<script src="app.js"></script>
</body>
</html>
